---
- hosts: web
  become: true

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  roles:
    - common
    - security
    - mysql
    - role: php
      tags: ["php"]
    - nginx
    - certbot
    - deploy
    - role: monolithprojects.github_actions_runner
      tags: ["runner"]
