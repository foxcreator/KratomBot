---
- name: Add PHP PPA
  apt_repository:
    repo: ppa:ondrej/php
    state: present
    update_cache: yes

- name: Install PHP {{ php_version }} and extensions
  apt:
    name:
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-intl"
    state: present
    update_cache: yes

- name: Configure PHP FPM (upload_max_filesize)
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    regexp: '^upload_max_filesize'
    line: 'upload_max_filesize = 20M'
  notify: Restart PHP-FPM

- name: Configure PHP FPM (post_max_size)
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    regexp: '^post_max_size'
    line: 'post_max_size = 20M'
  notify: Restart PHP-FPM

- name: Install Composer
  get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-setup.php

- name: Run Composer Installer
  shell: php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
  args:
    creates: /usr/local/bin/composer
