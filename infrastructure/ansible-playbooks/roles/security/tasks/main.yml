---
- name: Install security packages
  apt:
    name:
      - fail2ban
    state: present
    update_cache: yes

- name: Ensure Fail2Ban is running
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Configure SSHD (PermitRootLogin prohibit-password)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    validate: 'sshd -t -f %s'
  notify: Restart SSH

- name: Configure SSHD (PasswordAuthentication no)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  notify: Restart SSH
