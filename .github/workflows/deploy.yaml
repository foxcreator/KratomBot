name: Deploy AuraShopBot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, kratombot]

    env:
      REPO_PATH: "/var/www/kratombot"

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📂 Sync files to web root
        run: |
          rsync -rltz --no-owner --no-group --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude 'vendor' --exclude 'storage' --exclude 'bootstrap/cache' ./ $REPO_PATH/

      - name: 🔐 Ensure writable directories
        run: |
          sudo mkdir -p $REPO_PATH/storage/logs $REPO_PATH/storage/framework/{cache,sessions,views} $REPO_PATH/bootstrap/cache
          sudo chmod -R 777 $REPO_PATH/storage $REPO_PATH/bootstrap/cache

      - name: 📦 Composer install
        env:
          COMPOSER_ALLOW_SUPERUSER: 1
        run: |
          cd $REPO_PATH
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🔑 Generate Application Key (if missing)
        run: |
          cd $REPO_PATH
          if ! grep -q "^APP_KEY=base64:" .env; then
            php artisan key:generate --force
          fi

      - name: 🧱 Laravel optimize
        run: |
          cd $REPO_PATH
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      - name: 🔐 Set final permissions
        run: |
          sudo chown -R www-data:www-data $REPO_PATH/storage $REPO_PATH/bootstrap/cache
          sudo chmod -R 775 $REPO_PATH/storage $REPO_PATH/bootstrap/cache

      - name: 🔄 Restart services
        run: |
          sudo systemctl reload php8.2-fpm
          sudo systemctl reload nginx
